services:
  backend:
    build: ./backend
    ports: 
      - "4000:4000"
    env_file:
      - ./backend/.env
    depends_on: 
      - db

  db:
    image: mysql:8
    environment :
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE : expenses
    ports: 
      - "3306:3306"

  frontend:
    build: ./expense_tracker
    ports:
      -  "3000:3000"
    depends_on:
      - backend
